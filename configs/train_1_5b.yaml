# 학습 설정 — Qwen2.5-1.5B (0.5B와 동일 데이터로 비교). Kaggle T4x2 bf16.
# 0.5B는 configs/train.yaml. 차이: model_config(1.5B) + 출력명 + 메모리(배치 1/accum 32).
run_name: r12-qwen1.5b-lora

model_config: configs/model_qwen_1_5b.yaml
lora_config:  configs/lora.yaml

# 데이터셋 (0.5B와 완전히 동일 — 공정 비교)
train_data: data/processed/train.jsonl
eval_data:  data/processed/val.jsonl
eval_golden: data/eval/golden.jsonl

# 학습 하이퍼파라미터 (유효 batch 32 유지: 1×32). 1.5B라 per-device 배치 1로 낮춤(152k vocab OOM 회피).
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 32
num_train_epochs: 3
learning_rate: 2.0e-4
lr_scheduler_type: cosine
warmup_ratio: 0.05
weight_decay: 0.01
max_grad_norm: 1.0
seed: 42

# 출력
output_dir: models/lora/r12-qwen1.5b
logging_steps: 20
save_strategy: epoch
save_total_limit: 2
eval_strategy: epoch
load_best_model_at_end: true
metric_for_best_model: eval_loss
greater_is_better: false

# 메모리 / 속도
bf16: true
fp16: false
gradient_checkpointing: true    # 1.5B + 152k vocab — 필수
optim: paged_adamw_8bit
dataloader_num_workers: 2

# 4-bit 베이스 로딩 (QLoRA) — 1.5B가 T4에서 OOM이면 true로 (QLoRA)
load_in_4bit: false
bnb_4bit_quant_type: nf4
bnb_4bit_compute_dtype: bfloat16
bnb_4bit_use_double_quant: true

# WandB
report_to: none
