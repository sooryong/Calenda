# Lightning AI Studio 전용 학습 설정 — Qwen3-0.6B (베이스 스왑 A/B)
# L4 GPU(VRAM 24GB)에 맞춰 배치 상향. Kaggle r29(configs/train_qwen3_0_6b.yaml)와
# 데이터·모델·유효배치(32) 동일 → 두 트랙이 같은 A/B(모델만 Qwen3-0.6B). GPU/병렬만 차이.
# 사용: 노트북 run_training 셀 CONFIG가 이 파일을 가리킴 (단일 L4면 python, 멀티면 torchrun).
run_name: r29-qwen3-0.6b-lightning

model_config: configs/model_qwen3_0_6b.yaml   # ← 유일한 실질 차이 (Qwen2.5-1.5B 라인과)
lora_config:  configs/lora.yaml               # target_modules 동일(Qwen3도 q/k/v/o/gate/up/down_proj)

# 데이터셋 — Kaggle r29와 동일 파일을 가리켜야 A/B가 깨끗함 (모델만 변수)
train_data: data/processed/train.jsonl
eval_data:  data/processed/val.jsonl
eval_golden: data/eval/golden.jsonl   # r27 평가셋과 동일 50건 — 동일 기준 비교

# 학습 하이퍼파라미터 (유효 batch 32 유지: 4 × 8 = 32, Kaggle r29의 2×16과 동일)
# L4 24GB로 0.6B는 여유 — 배치 4로 속도 단축. vocab 152k logits는 grad_ckpt로 흡수.
per_device_train_batch_size: 4
per_device_eval_batch_size: 4
gradient_accumulation_steps: 8
num_train_epochs: 3
learning_rate: 2.0e-4
lr_scheduler_type: cosine
warmup_ratio: 0.05
weight_decay: 0.01
max_grad_norm: 1.0
seed: 42

# 출력 — Kaggle r29(models/lora/r29-qwen3-0.6b)와 격리되도록 -lightning 접미사
output_dir: models/lora/r29-qwen3-0.6b-lightning
logging_steps: 10
save_strategy: epoch
save_total_limit: 2
eval_strategy: epoch
load_best_model_at_end: true
metric_for_best_model: eval_loss
greater_is_better: false

# 메모리 / 속도 (L4 최적화)
bf16: true
fp16: false
gradient_checkpointing: true    # 큰 vocab logits 흡수
optim: paged_adamw_8bit
dataloader_num_workers: 2

# 16-bit Full LoRA (L4 VRAM 넉넉 → 4-bit 불필요)
load_in_4bit: false

# WandB 비활성화
report_to: none
