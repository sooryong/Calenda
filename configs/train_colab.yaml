# 학습 파이프라인 설정 — Colab용 (stable-fp16)
# Kaggle용은 configs/train.yaml(bf16). 차이: 정밀도(fp16) + 라운드 라벨(r9).
# stable-fp16: train_lora.py가 fp16 모드일 때 베이스를 fp32로 로드(마스터) + fp16 AMP →
#   T4 텐서코어로 빠름(~8s/step) + bf16급 안정. 순수 fp16(r7) 회귀 회피.
run_name: r9-qwen-0.5b-lora

model_config: configs/model_qwen.yaml
lora_config:  configs/lora.yaml

# 데이터셋 (repo에 포함 — Colab은 clone만으로 데이터 따라옴)
train_data: data/processed/train.jsonl
eval_data:  data/processed/val.jsonl
eval_golden: data/eval/golden.jsonl

# 학습 하이퍼파라미터 (Kaggle과 동일)
per_device_train_batch_size: 2
per_device_eval_batch_size: 2
gradient_accumulation_steps: 16        # 유효 batch 32
num_train_epochs: 3
learning_rate: 2.0e-4
lr_scheduler_type: cosine
warmup_ratio: 0.05
weight_decay: 0.01
max_grad_norm: 1.0
seed: 42

# 출력 (Colab은 r9 — Kaggle r8과 구분해 eval 비교 가능)
output_dir: models/lora/r9-qwen
logging_steps: 20
save_strategy: epoch
save_total_limit: 2
eval_strategy: epoch
load_best_model_at_end: true
metric_for_best_model: eval_loss
greater_is_better: false

# 메모리 / 속도 — stable-fp16
bf16: false
fp16: true                      # ← Kaggle(bf16)과 유일한 핵심 차이
gradient_checkpointing: true
optim: paged_adamw_8bit
dataloader_num_workers: 2

# 4-bit 베이스 로딩 (미사용)
load_in_4bit: false
bnb_4bit_quant_type: nf4
bnb_4bit_compute_dtype: float16
bnb_4bit_use_double_quant: true

# WandB
report_to: none
