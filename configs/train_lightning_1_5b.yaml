# Lightning AI Studio 전용 학습 설정 — Qwen2.5-1.5B
# L4 GPU (VRAM 24GB) 스펙에 최적화하여 배치 사이즈 상향 및 학습 속도 개선

run_name: r12-qwen1.5b-lightning

model_config: configs/model_qwen_1_5b.yaml
lora_config:  configs/lora.yaml

# 데이터셋 (기존과 동일)
train_data: data/processed/train.jsonl
eval_data:  data/processed/val.jsonl
eval_golden: data/eval/golden.jsonl

# 학습 하이퍼파라미터 (유효 batch 32 유지: 4 × 8 = 32)
# L4 GPU의 24GB VRAM을 활용해 배치를 4로 올려 학습 속도를 단축합니다.
per_device_train_batch_size: 4
per_device_eval_batch_size: 4
gradient_accumulation_steps: 8
num_train_epochs: 3
learning_rate: 2.0e-4
lr_scheduler_type: cosine
warmup_ratio: 0.05
weight_decay: 0.01
max_grad_norm: 1.0
seed: 42

# 출력 경로 분리 (코랩/캐글 결과 덮어쓰기 방지)
output_dir: models/lora/r12-qwen1.5b-lightning
logging_steps: 10
save_strategy: epoch
save_total_limit: 2
eval_strategy: epoch
load_best_model_at_end: true
metric_for_best_model: eval_loss
greater_is_better: false

# 메모리 / 속도 설정 (L4 최적화)
bf16: true
fp16: false
gradient_checkpointing: true
optim: paged_adamw_8bit
dataloader_num_workers: 2

# 16-bit Full LoRA 학습 (L4 VRAM이 넉넉하여 4-bit 양자화 불필요)
load_in_4bit: false

# WandB 비활성화
report_to: none
