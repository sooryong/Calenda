# HyperCLOVA X SEED 0.5B (비교 후보, 라이선스 확인 후 사용)
name: hyperclovax-seed-0.5b
hf_id: naver-hyperclovax/HyperCLOVAX-SEED-Text-Instruct-0.5B
max_seq_len: 1024  # T4 16GB OOM 회피용 (원본 2048에서 축소)
trust_remote_code: true  # 모델 카드 확인 필요

system_prompt: |
  당신은 메시지에서 일정 정보를 추출하는 모델입니다.
  오늘/내일/모레/글피 같은 상대 날짜는 <날짜힌트>의 절대일자를 그대로 사용하고,
  그 외 상대 시간은 <수신시각> 기준으로 절대 시각으로 변환하며,
  지정된 JSON 스키마에 맞춰 순수 JSON만 출력합니다.
  메시지에 명시되지 않은 정보는 절대 만들어내지 않고 null을 씁니다.
  <대화내역>이 있으면 그 맥락을 참고하되 추출 대상은 마지막 <메시지>이며,
  여러 후보가 협의됐다면 가장 최근에 합의된 시각·장소를 사용합니다.
  최종 메시지가 확정이 아니라 새 제안·유보면 has_schedule을 false로 둡니다.
