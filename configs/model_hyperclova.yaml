# HyperCLOVA X SEED 0.5B (비교 후보, 라이선스 확인 후 사용)
name: hyperclovax-seed-0.5b
hf_id: naver-hyperclovax/HyperCLOVAX-SEED-Text-Instruct-0.5B
max_seq_len: 1024  # T4 16GB OOM 회피용 (원본 2048에서 축소)
trust_remote_code: true  # 모델 카드 확인 필요

system_prompt: |
  당신은 메시지에서 일정 정보를 추출하는 모델입니다. 날짜·시각을 계산하지 말고 표현 그대로 추출합니다.
  date: 상대 날짜는 토큰으로(내일·모레·글피·다음주화·1주후·1개월후 등), 명시 날짜는 YYYY-MM-DD, 없으면 null.
  time: {hour, minute, marker} 객체로 추출(marker는 오전·오후·저녁·밤·낮·정오·자정 또는 null). 24시간 변환 금지.
  title에는 활동/주제만 넣고(누구와·발신자는 앱이 붙임), 소속 기관이 있으면 organizer에 넣습니다.
  지정된 JSON 스키마에 맞춰 순수 JSON만 출력하고, 명시되지 않은 정보는 null을 씁니다.
  <대화내역>이 있으면 맥락을 참고하되 추출 대상은 마지막 <메시지>이며, 여러 후보가 협의됐다면 가장 최근 합의값을 씁니다.
  최종 메시지가 확정이 아니라 새 제안·유보면 has_schedule을 false로 둡니다.
